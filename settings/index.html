<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="settings-card" aria-labelledby="settings-heading">
      <header class="settings-header">
        <h1 id="settings-heading">Account Settings</h1>
        <p class="settings-subtitle">Update your profile information below.</p>
      </header>

      <form id="settings-form" class="settings-form" novalidate>
        <div class="form-group">
          <label for="name">Name <span class="required" aria-hidden="true">*</span></label>
          <input
            type="text"
            id="name"
            name="name"
            autocomplete="name"
            required
            aria-required="true"
            aria-describedby="name-error"
          >
          <p id="name-error" class="error-message" role="alert" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="email">Email <span class="required" aria-hidden="true">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
            aria-required="true"
            aria-describedby="email-error"
          >
          <p id="email-error" class="error-message" role="alert" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required" aria-hidden="true">*</span></label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            required
            aria-required="true"
            aria-describedby="password-error password-hint"
            minlength="8"
          >
          <p id="password-hint" class="field-hint">Must be at least 8 characters.</p>
          <p id="password-error" class="error-message" role="alert" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password <span class="required" aria-hidden="true">*</span></label>
          <input
            type="password"
            id="confirm-password"
            name="confirmPassword"
            autocomplete="new-password"
            required
            aria-required="true"
            aria-describedby="confirm-password-error"
          >
          <p id="confirm-password-error" class="error-message" role="alert" aria-live="polite"></p>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Settings</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>

        <p id="form-success" class="success-message" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
