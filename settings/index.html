<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="settings-page">
    <header class="settings-header">
      <h1>Settings</h1>
      <p>Manage your account preferences and notifications.</p>
    </header>

    <form id="settings-form" class="settings-form" novalidate>
      <section class="settings-section">
        <h2>Profile</h2>

        <div class="form-group">
          <label for="display-name">Display name</label>
          <input
            type="text"
            id="display-name"
            name="displayName"
            placeholder="Your name"
            autocomplete="name"
            required
          >
          <span class="error-message" data-for="displayName"></span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
          <span class="error-message" data-for="email"></span>
        </div>
      </section>

      <section class="settings-section">
        <h2>Preferences</h2>

        <div class="form-group">
          <label for="language">Language</label>
          <select id="language" name="language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
        </div>

        <div class="form-group">
          <label for="theme">Theme</label>
          <select id="theme" name="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="system">System</option>
          </select>
        </div>
      </section>

      <section class="settings-section">
        <h2>Notifications</h2>

        <div class="form-group form-group--toggle">
          <div>
            <label for="email-notifications">Email notifications</label>
            <p class="field-hint">Receive updates about your account by email.</p>
          </div>
          <label class="toggle">
            <input type="checkbox" id="email-notifications" name="emailNotifications">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="form-group form-group--toggle">
          <div>
            <label for="marketing-emails">Marketing emails</label>
            <p class="field-hint">Get news, tips, and product announcements.</p>
          </div>
          <label class="toggle">
            <input type="checkbox" id="marketing-emails" name="marketingEmails">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </section>

      <div class="form-actions">
        <button type="button" id="reset-btn" class="btn btn-secondary">Reset</button>
        <button type="submit" class="btn btn-primary">Save changes</button>
      </div>

      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
